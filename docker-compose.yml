version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vatsalya_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: vatsalya_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vatsalya_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/vatsalya_db?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=vatsalyayoga_jwt_secret_key_some_random_string_here_987654321
      - SEED_DB=true
    depends_on:
      - db

volumes:
  pgdata:
